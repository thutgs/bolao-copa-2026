<div class="shell-layout">
  <!-- Sidebar fixa à esquerda -->
  <aside class="sidebar">
    <div class="sidebar-content">
      <!-- Logo -->
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="32" height="32" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Trave de gol (perspectiva) -->
            <path d="M20 140 L20 40 L180 40 L180 140" stroke="#532aab" stroke-width="6" fill="none" stroke-linecap="round"/>
            <!-- Travessão superior -->
            <path d="M20 40 L180 40" stroke="#532aab" stroke-width="6" stroke-linecap="round"/>
            <!-- Postes verticais -->
            <path d="M20 40 L20 140" stroke="#532aab" stroke-width="6" stroke-linecap="round"/>
            <path d="M180 40 L180 140" stroke="#532aab" stroke-width="6" stroke-linecap="round"/>
            <!-- Rede da trave (linhas horizontais) -->
            <line x1="25" y1="60" x2="175" y2="60" stroke="#532aab" stroke-width="1.5" opacity="0.5"/>
            <line x1="25" y1="80" x2="175" y2="80" stroke="#532aab" stroke-width="1.5" opacity="0.5"/>
            <line x1="25" y1="100" x2="175" y2="100" stroke="#532aab" stroke-width="1.5" opacity="0.5"/>
            <line x1="25" y1="120" x2="175" y2="120" stroke="#532aab" stroke-width="1.5" opacity="0.5"/>
            <!-- Rede da trave (linhas verticais) -->
            <line x1="50" y1="40" x2="50" y2="140" stroke="#532aab" stroke-width="1.5" opacity="0.5"/>
            <line x1="80" y1="40" x2="80" y2="140" stroke="#532aab" stroke-width="1.5" opacity="0.5"/>
            <line x1="110" y1="40" x2="110" y2="140" stroke="#532aab" stroke-width="1.5" opacity="0.5"/>
            <line x1="140" y1="40" x2="140" y2="140" stroke="#532aab" stroke-width="1.5" opacity="0.5"/>
            <!-- Bola de futebol (verde) -->
            <circle cx="145" cy="55" r="18" fill="#532aab"/>
            <!-- Hexágonos da bola -->
            <path d="M145 43 L153 48 L153 58 L145 63 L137 58 L137 48 Z" fill="#05060c" opacity="0.3"/>
            <!-- Brilho na bola -->
            <ellipse cx="140" cy="48" rx="4" ry="3" fill="#ffffff" opacity="0.4"/>
            <!-- Trajetória da bola -->
            <line x1="165" y1="48" x2="175" y2="42" stroke="#532aab" stroke-width="3" stroke-linecap="round"/>
            <line x1="168" y1="55" x2="180" y2="50" stroke="#532aab" stroke-width="3" stroke-linecap="round"/>
            <line x1="165" y1="62" x2="175" y2="58" stroke="#532aab" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="logo-text">GOL<span class="logo-highlight">a</span>GOL</h1>
      </div>

      <!-- Navegação -->
      <nav class="sidebar-nav">
        <a
          routerLink="/dashboard"
          routerLinkActive="active"
          class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Dashboard</span>
        </a>

        <a
          routerLink="/palpites"
          routerLinkActive="active"
          class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span>Palpites</span>
        </a>

        <a
          routerLink="/boloes"
          routerLinkActive="active"
          class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55-.47.98-.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
          </svg>
          <span>Bolões</span>
        </a>

        <a
          routerLink="/jogos"
          routerLinkActive="active"
          class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          <span>Jogos</span>
        </a>

        <!-- O botão de Admin só será renderizado se a flag is_global_admin for true -->
        @if (isAdmin()) {
          <a
            routerLink="/admin"
            routerLinkActive="active"
            class="nav-item">
            <!-- Ícone de Engrenagem (Configurações) -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <span>Admin</span>
          </a>
        }
      </nav>

      <!-- Footer do sidebar -->
      <div class="sidebar-footer">
        <!-- Usuário logado -->
        @if (currentUser()) {
          <div class="user-info">
            <div class="user-avatar">
              @if (currentUser()?.avatar === 'feminino') {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#532aab" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                  <path d="M12 14a4 4 0 0 1 4 4"/>
                </svg>
              } @else {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#532aab" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              }
            </div>
            <div class="user-details">
              <span class="user-name">{{ currentUser()?.nome || 'Usuário' }}</span>
              <span class="user-email">{{ currentUser()?.email }}</span>
            </div>
          </div>
        }
        
        <button (click)="logout()" class="logout-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Sair</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Área principal -->
  <main class="main-content">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

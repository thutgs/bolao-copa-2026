<div class="shell-layout">
  <!-- Sidebar fixa à esquerda -->
  <aside class="sidebar">
    <div class="sidebar-content">
      <!-- Logo -->
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="32" height="32" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Trave de gol (perspectiva) -->
            <path d="M20 140 L20 40 L180 40 L180 140" stroke="#532aab" stroke-width="6" fill="none"
              stroke-linecap="round" />
            <!-- Travessão superior -->
            <path d="M20 40 L180 40" stroke="#532aab" stroke-width="6" stroke-linecap="round" />
            <!-- Postes verticais -->
            <path d="M20 40 L20 140" stroke="#532aab" stroke-width="6" stroke-linecap="round" />
            <path d="M180 40 L180 140" stroke="#532aab" stroke-width="6" stroke-linecap="round" />
            <!-- Rede da trave (linhas horizontais) -->
            <line x1="25" y1="60" x2="175" y2="60" stroke="#532aab" stroke-width="1.5" opacity="0.5" />
            <line x1="25" y1="80" x2="175" y2="80" stroke="#532aab" stroke-width="1.5" opacity="0.5" />
            <line x1="25" y1="100" x2="175" y2="100" stroke="#532aab" stroke-width="1.5" opacity="0.5" />
            <line x1="25" y1="120" x2="175" y2="120" stroke="#532aab" stroke-width="1.5" opacity="0.5" />
            <!-- Rede da trave (linhas verticais) -->
            <line x1="50" y1="40" x2="50" y2="140" stroke="#532aab" stroke-width="1.5" opacity="0.5" />
            <line x1="80" y1="40" x2="80" y2="140" stroke="#532aab" stroke-width="1.5" opacity="0.5" />
            <line x1="110" y1="40" x2="110" y2="140" stroke="#532aab" stroke-width="1.5" opacity="0.5" />
            <line x1="140" y1="40" x2="140" y2="140" stroke="#532aab" stroke-width="1.5" opacity="0.5" />
            <!-- Bola de futebol (verde) -->
            <circle cx="145" cy="55" r="18" fill="#532aab" />
            <!-- Hexágonos da bola -->
            <path d="M145 43 L153 48 L153 58 L145 63 L137 58 L137 48 Z" fill="#05060c" opacity="0.3" />
            <!-- Brilho na bola -->
            <ellipse cx="140" cy="48" rx="4" ry="3" fill="#ffffff" opacity="0.4" />
            <!-- Trajetória da bola -->
            <line x1="165" y1="48" x2="175" y2="42" stroke="#532aab" stroke-width="3" stroke-linecap="round" />
            <line x1="168" y1="55" x2="180" y2="50" stroke="#532aab" stroke-width="3" stroke-linecap="round" />
            <line x1="165" y1="62" x2="175" y2="58" stroke="#532aab" stroke-width="3" stroke-linecap="round" />
          </svg>
        </div>
        <h1 class="logo-text">GOL<span class="logo-highlight">a</span>GOL</h1>
      </div>

      <!-- Navegação -->
      <nav class="sidebar-nav">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9" rx="1" />
            <rect x="14" y="3" width="7" height="5" rx="1" />
            <rect x="14" y="12" width="7" height="9" rx="1" />
            <rect x="3" y="16" width="7" height="5" rx="1" />
          </svg>
          <span>Dashboard</span>
        </a>

        <a routerLink="/palpites" routerLinkActive="active" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-5.5" />
            <path d="M4 13.5V6a2 2 0 0 1 2-2h2" />
            <path
              d="M13.378 15.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z" />
          </svg>
          <span>Palpites</span>
        </a>

        <a routerLink="/boloes" routerLinkActive="active" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
            <path d="M4 22h16" />
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
            <path d="M14 14.66V17c0 .55-.47.98-.97 1.21C16.15 18.75 17 20.24 17 22" />
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
          </svg>
          <span>Bolões</span>
        </a>

        <a routerLink="/ranking" routerLinkActive="active" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <!-- Cabeça -->
            <circle cx="12" cy="3" r="2" />
            <!-- Corpo -->
            <path
              d="M14 5h-4c-1 0-1.5.5-2 1.5L5.5 11 7 12.5 9.5 8.5V10L8.5 14h2L12 11l1.5 3h2L14.5 10V8.5L17 12.5 18.5 11 16 6.5C15.5 5.5 15 5 14 5z" />
            <!-- Pódios -->
            <path d="M2 16h6v6H2z" />
            <path d="M8 14h8v8H8z" />
            <path d="M16 18h6v4h-6z" />
            <!-- Número 1 vazado -->
            <path d="M11 17.5L12 16v4.5h-1z" fill="#05060c" />
          </svg>
          <span>Ranking</span>
        </a>

        <a routerLink="/jogos" routerLinkActive="active" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5" />
            <path d="M16 2v4" />
            <path d="M8 2v4" />
            <path d="M3 10h5" />
            <path d="M17.5 17.5 16 16.25V14" />
            <circle cx="16" cy="16" r="6" />
          </svg>
          <span>Jogos</span>
        </a>

        <!-- O botão de Admin só será renderizado se a flag is_global_admin for true -->
        @if (isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active" class="nav-item">
          <!-- Ícone de Engrenagem (Configurações) -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 14.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
            <path d="M12 18v1M12 5v1M6.5 12h1M16.5 12h1M8.1 15.9l.7-.7M15.2 8.8l.7-.7M8.1 8.1l.7.7M15.2 15.2l.7.7" />
            <path d="M17.5 18.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" />
            <path
              d="M17.5 21v.5M17.5 14v.5M14 17.5h.5M20 17.5h.5M15.4 19.6l.3-.3M19.3 15.7l.3-.3M15.4 15.4l.3.3M19.3 19.3l.3.3" />
            <path d="M6.5 7.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" />
            <path d="M6.5 10v.5M6.5 3v.5M3 6.5h.5M9 6.5h.5M4.4 8.6l.3-.3M8.3 4.7l.3-.3M4.4 4.4l.3.3M8.3 8.3l.3.3" />
          </svg>
          <span>Admin</span>
        </a>
        }
      </nav>

      <!-- Footer do sidebar -->
      <div class="sidebar-footer">
        <!-- Usuário logado -->
        @if (currentUser()) {
        <div class="user-info">
          <div class="user-avatar">
            @if (currentUser()?.avatar === 'feminino') {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#532aab" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
              <path d="M12 14a4 4 0 0 1 4 4" />
            </svg>
            } @else {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#532aab" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            }
          </div>
          <div class="user-details">
            <span class="user-name">{{ currentUser()?.nome || 'Usuário' }}</span>
            <span class="user-email">{{ currentUser()?.email }}</span>
          </div>
        </div>
        }

        <button (click)="logout()" class="logout-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          <span>Sair</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Área principal -->
  <main class="main-content">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
